<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>FlowSense Flow</title>
<style>
  /* Reset — no margin, no padding, no scroll, transparent bg */
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* Center the pill */
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 52px;
  }

  /* The pill */
  .pill {
    position: relative;
    display: flex;
    align-items: center;
    gap: 10px;
    height: 38px;
    padding: 0 14px;
    background: rgba(16, 16, 22, 0.93);
    border: 1px solid rgba(139, 92, 246, 0.25);
    border-radius: 100px;
    box-shadow:
      0 4px 24px rgba(0, 0, 0, 0.6),
      0 0 0 0.5px rgba(255, 255, 255, 0.04) inset;
    backdrop-filter: blur(16px) saturate(1.4);
    -webkit-backdrop-filter: blur(16px) saturate(1.4);
    user-select: none;
    -webkit-app-region: no-drag;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #8b5cf6;
    box-shadow: 0 0 8px rgba(139, 92, 246, 0.6);
    animation: pulse 1.6s ease-in-out infinite;
    flex-shrink: 0;
  }
  .dot.complete { background: #22c55e; box-shadow: 0 0 8px rgba(34,197,94,0.5); animation: none; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .info { display: flex; flex-direction: column; justify-content: center; flex: 1; min-width: 0; }
  .step-count { font-size: 9px; color: #94a3b8; letter-spacing: 0.02em; line-height: 1; margin-bottom: 2px; }
  .app-name {
    font-size: 12px;
    font-weight: 600;
    color: #f1f5f9;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.2;
    max-width: 160px;
  }
  .app-name.complete { color: #22c55e; }

  .btn {
    -webkit-app-region: no-drag;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 5px 12px;
    border: none;
    border-radius: 100px;
    background: rgba(139, 92, 246, 0.18);
    color: #c4b5fd;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.12s ease;
    flex-shrink: 0;
    line-height: 1;
    font-family: inherit;
  }
  .btn:hover { background: rgba(139, 92, 246, 0.32); }
  .btn:active { background: rgba(139, 92, 246, 0.45); transform: scale(0.97); }
  .btn.success { background: rgba(34, 197, 94, 0.18); color: #86efac; }
  .btn.success:hover { background: rgba(34, 197, 94, 0.3); }

  .progress {
    position: absolute;
    bottom: 0;
    left: 14px;
    right: 14px;
    height: 2px;
    background: rgba(148, 163, 184, 0.12);
    border-radius: 1px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #8b5cf6;
    border-radius: 1px;
    transition: width 0.3s ease;
    box-shadow: 0 0 6px rgba(139, 92, 246, 0.4);
  }

  .close {
    -webkit-app-region: no-drag;
    background: none;
    border: none;
    color: #64748b;
    cursor: pointer;
    padding: 2px;
    line-height: 0;
    flex-shrink: 0;
    transition: color 0.12s ease;
  }
  .close:hover { color: #cbd5e1; }
</style>
</head>
<body>
  <div class="pill">
    <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
    <div class="dot" id="dot"></div>
    <div class="info">
      <div class="step-count" id="stepCount">Step 1/3</div>
      <div class="app-name" id="appName">Edge</div>
    </div>
    <button class="btn" id="actionBtn">▶ Start</button>
    <button class="close" id="closeBtn" aria-label="Close">
      <svg width="9" height="9" viewBox="0 0 9 9" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M1 1L8 8M8 1L1 8"/>
      </svg>
    </button>
  </div>

  <script>
    var { ipcRenderer } = require("electron");

    var state = { currentStep: 0, totalSteps: 1, appName: "", workflowName: "", isComplete: false };
    var dot = document.getElementById("dot");
    var stepCount = document.getElementById("stepCount");
    var appName = document.getElementById("appName");
    var actionBtn = document.getElementById("actionBtn");
    var progressFill = document.getElementById("progressFill");
    var closeBtn = document.getElementById("closeBtn");

    ipcRenderer.on("overlay:state", function (_e, next) {
      state = Object.assign({}, state, next);
      render();
    });

    actionBtn.addEventListener("click", function () {
      if (state.isComplete) {
        ipcRenderer.send("overlay:complete");
      } else {
        ipcRenderer.send("overlay:next", state.appName);
      }
    });

    closeBtn.addEventListener("click", function () {
      ipcRenderer.send("overlay:close");
    });

    function render() {
      stepCount.textContent = state.isComplete ? "Flow Complete" : "Step " + (state.currentStep + 1) + "/" + state.totalSteps;
      appName.textContent = state.isComplete ? "✓ All done" : state.appName;
      appName.classList.toggle("complete", state.isComplete);
      dot.classList.toggle("complete", state.isComplete);
      var pct = state.totalSteps > 0 ? Math.min(100, (state.currentStep / state.totalSteps) * 100) : 0;
      progressFill.style.width = (state.isComplete ? 100 : pct) + "%";
      if (state.isComplete) {
        actionBtn.textContent = "✓ Done";
        actionBtn.classList.add("success");
      } else if (state.currentStep === 0) {
        actionBtn.textContent = "▶ Start";
        actionBtn.classList.remove("success");
      } else {
        actionBtn.textContent = "▶ Next";
        actionBtn.classList.remove("success");
      }
    }

    render();
  </script>
</body>
</html>
